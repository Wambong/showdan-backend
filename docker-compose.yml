services:
  db:
    image: kartoza/postgis
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "showdan"
      POSTGRES_PASS: "XkVMBg5Ik7vEW1hq8Orb"
      POSTGRES_DB: "postgres"
    volumes:
      - db_data:/opt/postgres/data
      - ./init-script.sql:/docker-entrypoint-initdb.d/setup-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U showdan -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      AIRAG_LLM_MODEL: "llama3.2"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull $$AIRAG_LLM_MODEL"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://showdan:XkVMBg5Ik7vEW1hq8Orb@db:5432/postgres"
      REDIS_URL: "redis://redis:6379/0"
      OLLAMA_BASE_URL: "http://ollama:11434"
      AIRAG_LLM_MODEL: "llama3.2"
    image: showdan/backend
    ports:
      - "8000:8000"

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
